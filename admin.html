<h1>R Max Auto Sales - Admin</h1>

<form>
  <input id="year" placeholder="Year"><br><br>
  <input id="make" placeholder="Make"><br><br>
  <input id="model" placeholder="Model"><br><br>
  <input id="price" placeholder="Price"><br><br>
  <input id="image" placeholder="Image URL"><br><br>

  <button type="button" onclick="saveCar()">Save Car</button>
</form>

<script>
function saveCar() {
  const car = {
    year: document.getElementById("year").value,
    make: document.getElementById("make").value,
    model: document.getElementById("model").value,
    price: document.getElementById("price").value,
    image: document.getElementById("image").value
  };

  let cars = JSON.parse(localStorage.getItem("cars") || "[]");
  cars.push(car);
  localStorage.setItem("cars", JSON.stringify(cars));

  alert("Car saved!");
}
</script>
